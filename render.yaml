services:
  - type: web
    name: vari-longshort-screener
    runtime: python
    plan: free
    buildCommand: ./scripts/render_build.sh
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: HTTPS_PROXY
        sync: false
