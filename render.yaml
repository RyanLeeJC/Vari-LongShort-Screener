services:
  - type: web
    name: vari-longshort-screener
    runtime: python
    plan: free
    buildCommand: ./scripts/render_build.sh
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: COINGECKO_API_KEY_TYPE
        value: pro
      - key: CG_API_BASE
        value: https://pro-api.coingecko.com/api/v3
      - key: COINGECKO_API_KEY
        sync: false
